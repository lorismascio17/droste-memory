name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q --junitxml=.pytest-results.xml
      - name: Report pytest failures
        if: failure()
        shell: python
        run: |
          import pathlib
          import xml.etree.ElementTree as ET

          report = pathlib.Path(".pytest-results.xml")
          if not report.exists():
              print("::error::pytest did not produce .pytest-results.xml")
              raise SystemExit(0)

          root = ET.parse(report).getroot()
          for case in root.iter("testcase"):
              problem = case.find("failure")
              if problem is None:
                  problem = case.find("error")
              if problem is None:
                  continue
              message = problem.get("message") or problem.text or "pytest failure"
              message = " ".join(message.split())[:900]
              name = f"{case.get('classname', 'pytest')}.{case.get('name', 'unknown')}"
              print(f"::error::{name}: {message}")
